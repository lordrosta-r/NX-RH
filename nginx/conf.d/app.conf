# =============================================================================
# Nginx — NanoXplore RH site config
#
# - HTTP  → HTTPS redirect (port 80 → 443)
# - HTTPS → Load-balanced upstream Express instances
# - Static assets cached at edge
# - Security headers
#
# Certificate paths (mount via docker-compose volumes):
#   /etc/nginx/certs/fullchain.pem   ← cert + chain
#   /etc/nginx/certs/privkey.pem     ← private key
#
# For Let's Encrypt: run scripts/certbot-init.sh then restart nginx.
# For self-signed (dev): run scripts/gen-certs.sh
# =============================================================================

# ── Upstream — Express app instances (Docker DNS resolves all replicas) ───
upstream nanoxplore_app {
    # "app" is the docker-compose service name.
    # When scaled (--scale app=3), Docker round-robins between replicas.
    server app:3000;

    # Uncomment for sticky sessions (useful if you add server-side sessions):
    # ip_hash;

    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Allow certbot ACME challenge through before redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;                          # Replace with your domain in prod

    # ── TLS ────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY                                            always;
    add_header X-Content-Type-Options     nosniff                                         always;
    add_header X-XSS-Protection           "1; mode=block"                                 always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"      always;

    # ── Static assets — served directly by Nginx (bypasses Express) ───────
    # Vite adds content hashes to filenames, so assets can be cached forever.
    location ~* \.(js|css|woff2?|ttf|svg|png|ico|webp)$ {
        proxy_pass http://nanoxplore_app;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API — rate-limited ──────────────────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://nanoxplore_app;
        include    /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/ {
        proxy_pass http://nanoxplore_app;
        include    /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── MPA pages — all other routes go to Express ─────────────────────────
    location / {
        proxy_pass http://nanoxplore_app;
        include    /etc/nginx/conf.d/proxy_params.conf;
    }
}
