# =============================================================================
# NanoXplore RH — Docker Compose Override (Development)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
# =============================================================================

services:

  # ── Vite dev server (frontend-v2) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-v2
      dockerfile: Dockerfile.dev
    container_name: nx_frontend_dev
    environment:
      VITE_API_URL: ""
    volumes:
      - ./frontend-v2:/app:delegated
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - frontend

  # ── Backend live-reload ───────────────────────────────────────────────────
  app:
    build:
      target: server
    command: ["npx", "nodemon", "index.js"]
    environment:
      NODE_ENV: development
      MAIL_HOST: mailhog
      MAIL_PORT: "1025"
      LDAP_URL: ldap://openldap:389
      LDAP_BASE_DN: dc=nxrh,dc=local
      LDAP_BIND_DN: cn=admin,dc=nxrh,dc=local
      LDAP_BIND_PASSWORD: adminpass
    volumes:
      - ./mongo/server:/app:delegated
      - /app/node_modules
    ports:
      # Hôte 3001 → conteneur 3000 (évite le conflit avec d'autres projets sur 3000 ;
      # l'API reste accessible via nginx sur https://localhost/api).
      - "3001:3000"
    depends_on:
      - mailhog
      - openldap
    networks:
      - frontend
      - backend

  # ── MongoDB exposed for GUI clients ──────────────────────────────────────
  mongo:
    ports:
      - "27017:27017"

  # ── MailHog (fake SMTP + WebUI) ───────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: nx_mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - backend

  # ── OpenLDAP ──────────────────────────────────────────────────────────────
  openldap:
    image: osixia/openldap:1.5.0
    container_name: nx_openldap
    environment:
      LDAP_ORGANISATION: "NanoXplore RH"
      LDAP_DOMAIN: nxrh.local
      LDAP_ADMIN_PASSWORD: adminpass
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: readonly
      LDAP_READONLY_USER_PASSWORD: readonlypass
      # Ne pas supprimer le dossier de bootstrap (il est bind-monté → rm échoue)
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
      # Le bootstrap osixia (montage LDIF) est destructif/fragile : on peuple
      # l'annuaire APRÈS démarrage via scripts/ldap-seed.sh (ldapadd + ldappasswd).
    networks:
      - backend

  # ── OpenLDAP #2 — annuaire « Partner » (test multi-source) ────────────────
  openldap2:
    image: osixia/openldap:1.5.0
    container_name: nx_openldap2
    environment:
      LDAP_ORGANISATION: "Partner Directory"
      LDAP_DOMAIN: partner.local
      LDAP_ADMIN_PASSWORD: partnerpass
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
    ports:
      - "390:389"
    volumes:
      - openldap2_data:/var/lib/ldap
      - openldap2_config:/etc/ldap/slapd.d
    networks:
      - backend

  # ── phpLDAPadmin ──────────────────────────────────────────────────────────
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: nx_phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8080:80"
    depends_on:
      - openldap
    networks:
      - backend

  # ── Nginx — dev override: routes /api to Express, / to Vite dev ─────────
  nginx:
    profiles: []   # re-enable nginx in dev
    volumes:
      - ./docker/nginx-dev.conf:/etc/nginx/conf.d/app.conf:ro   # replace prod config
    depends_on:
      - frontend
    networks:
      - frontend
      - backend

volumes:
  openldap_data:
  openldap_config:
  openldap2_data:
  openldap2_config: