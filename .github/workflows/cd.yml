name: CD

# Livraison continue : construit l'image Docker, la teste, puis la PUBLIE sur
# le registre GitHub (ghcr.io). Sur un tag v* (release), l'image est aussi
# taguée avec la version → un package déployable et versionné.
on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/lordrosta-r/nx-rh

jobs:
  publish:
    name: Build, test & publish image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          TAGS="${IMAGE}:${{ github.sha }}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAGS="${TAGS},${IMAGE}:${{ github.ref_name }},${IMAGE}:latest"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the published image
        run: |
          IMAGE_REF="${IMAGE}:${{ github.sha }}"
          docker pull "$IMAGE_REF"
          docker network create nxnet
          docker run -d --name mongo --network nxnet mongo:7
          docker run -d --name nxrh-test --network nxnet \
            -e NODE_ENV=production \
            -e MONGO_URI=mongodb://mongo:27017/test \
            -e JWT_SECRET=$(openssl rand -hex 32) \
            -e JWT_REFRESH_SECRET=$(openssl rand -hex 32) \
            "$IMAGE_REF"
          sleep 10
          docker ps | grep nxrh-test || (docker logs nxrh-test && exit 1)
          docker logs nxrh-test 2>&1 | grep -q "NanoXplore RH démarré" || (docker logs nxrh-test && exit 1)
          docker stop nxrh-test mongo
