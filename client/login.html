<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NanoXplore RH — Connexion</title>

    <!-- Fond noir immédiat — évite le flash blanc Safari avant tout rendu -->
    <style>html, body { background: #000; height: 100%; overflow: hidden; }</style>

    <!-- Anti-flash : affine le thème (light → gris clair) + lang AVANT que React monte -->
    <script>
      (function () {
        var BG = { 'light': '#f5f5f5', 'light-sidebar': '#f5f5f5' }
        try {
          var t = localStorage.getItem('nx_theme')
          if (t && BG[t]) document.documentElement.style.background = BG[t]
          document.documentElement.setAttribute('data-theme', ['dark','light','light-sidebar'].indexOf(t) !== -1 ? t : 'dark')
          var l = localStorage.getItem('nx_locale')
          if (l) document.documentElement.setAttribute('lang', l === 'fr' ? 'fr' : 'en')
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>

    <!-- Inter (design system typography) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root" tabindex="-1"></div>
    <script type="module" src="/src/pages/login/main.jsx"></script>
  </body>
</html>
