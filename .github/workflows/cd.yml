name: CD

# Build + smoke-test de l'image Docker, déclenché sur les tags `v*` (au moment d'une
# release). L'image N'EST PAS publiée sur un registre — les artefacts de déploiement
# sont fournis en pièces jointes des releases. La validation à chaque commit (build front,
# tests) est assurée par la CI ; inutile de rejouer le build image à chaque push.
on:
  push:
    tags: ['v*']

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build & smoke-test image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build image (local, sans publication)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: nx-rh:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (l'image démarre)
        run: |
          docker network create nxnet
          docker run -d --name mongo --network nxnet mongo:7
          docker run -d --name nxrh-test --network nxnet \
            -e NODE_ENV=production \
            -e MONGO_URI=mongodb://mongo:27017/test \
            -e JWT_SECRET=$(openssl rand -hex 32) \
            -e JWT_REFRESH_SECRET=$(openssl rand -hex 32) \
            nx-rh:ci
          sleep 10
          docker ps | grep nxrh-test || (docker logs nxrh-test && exit 1)
          docker logs nxrh-test 2>&1 | grep -q "NanoXplore RH démarré" || (docker logs nxrh-test && exit 1)
          docker stop nxrh-test mongo
