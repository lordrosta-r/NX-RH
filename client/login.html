<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NanoXplore RH — Connexion</title>

    <!-- Anti-flash : applique data-theme AVANT que React monte -->
    <script>
      (function () {
        var t = localStorage.getItem('nx_theme')
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark')
      })()
    </script>

    <!-- Verrou scroll page entière -->
    <style>html, body { height: 100%; overflow: hidden; }</style>

    <!-- Inter (design system typography) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/pages/login/main.jsx"></script>
  </body>
</html>
