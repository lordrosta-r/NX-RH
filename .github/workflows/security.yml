name: Security — npm audit

# Analyse de sécurité des dépendances (gratuit, repo privé ou public).
# Échoue uniquement sur les vulnérabilités "high" ou "critical" pour ne pas
# bloquer sur du bruit de faible sévérité.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Tous les lundis à 6h UTC — capte les failles publiées entre deux commits.
    - cron: "0 6 * * 1"

# Moindre privilège (CodeQL actions/missing-workflow-permissions) : npm audit
# n'a besoin que de lire le code.
permissions:
  contents: read

jobs:
  audit:
    name: npm audit (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            dir: frontend-v2
          - name: backend
            dir: mongo/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Audit ${{ matrix.name }}
        working-directory: ${{ matrix.dir }}
        run: npm audit --audit-level=high
