# =============================================================================
# NanoXplore RH — Docker Compose (Production / HA)
#
# Services:
#   nginx  — Reverse proxy, SSL termination, load balancer
#   app    — Express server (scale with: docker compose up --scale app=3)
#   mongo  — MongoDB 7 with persistent volume
#
# Usage:
#   docker compose up -d
#   docker compose up -d --scale app=3   ← high-availability mode
# =============================================================================

services:

  # ── Bootstrap TLS — génère un cert auto-signé si aucun n'est présent ──────
  # Permet à nginx de démarrer sur un déploiement neuf (chicken-and-egg).
  # L'admin remplace ensuite ce cert via l'UI (Administration > Certificat SSL).
  cert-init:
    image: alpine:3.20
    command: >
      sh -c "apk add --no-cache openssl >/dev/null 2>&1;
             if [ ! -f /certs/fullchain.pem ] || [ ! -f /certs/privkey.pem ]; then
               echo 'Génération d un certificat auto-signé (localhost)...';
               openssl req -x509 -newkey rsa:2048 -nodes -days 365
                 -keyout /certs/privkey.pem -out /certs/fullchain.pem
                 -subj '/CN=localhost';
               chmod 600 /certs/privkey.pem;
             else echo 'Certificat déjà présent, rien à faire.'; fi"
    volumes:
      - ./nginx/certs:/certs:rw

  # ── Nginx — Reverse Proxy + SSL ──────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nx_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro          # certs TLS (écrits par cert-init / app)
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
      cert-init:
        condition: service_completed_successfully
    networks:
      - frontend
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ── App — Express MPA Server (horizontally scalable) ─────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nanoxplore-rh:latest
    # No container_name when scaling — Docker assigns names automatically
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      COOKIE_SECURE: 'true'
      CERTS_DIR: /etc/nginx/certs           # cible de l'upload SSL (volume partagé avec nginx)
    volumes:
      - uploads_data:/data/uploads          # Documents RH téléversés (persistant)
      - ./nginx/certs:/etc/nginx/certs:rw    # certs TLS : l'app y écrit (upload UI), nginx y lit
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "3000"           # Internal only — Nginx proxies to this
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "5" }

  # ── MongoDB 7 ─────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: nx_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:?MONGO_ROOT_USER is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-nanoxplore_rh}
    volumes:
      - mongo_data:/data/db
    expose:
      - "27017"            # Internal only — never expose DB to host in prod
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  frontend:   # nginx ↔ app
  backend:    # app ↔ db (isolated — nginx has no DB access)

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  mongo_data:  # MongoDB data — survives container restarts
  nginx_logs:
  uploads_data:  # Documents RH téléversés — persistant
