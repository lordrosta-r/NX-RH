# =============================================================================
# NanoXplore RH — Docker Compose Override (Development)
#
# Extends docker-compose.yml for local development:
#   - Exposes MySQL port for GUI clients (TablePlus, DBeaver…)
#   - Mounts server/ source for live-reload with nodemon
#   - Skips nginx (access app directly on port 3000)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# =============================================================================

services:

  app:
    build:
      target: server           # Skip the client-builder stage
    command: ["npx", "nodemon", "index.js"]
    environment:
      NODE_ENV: development
    volumes:
      - ./server:/app:delegated      # Live-reload server source
      - /app/node_modules            # Keep container's node_modules isolated
    ports:
      - "3000:3000"                  # Direct access — no nginx in dev

  db:
    ports:
      - "3306:3306"                  # Expose for local DB clients

  # Disable nginx in dev mode
  nginx:
    profiles:
      - production                   # Only starts with --profile production
