# Override pour les tests e2e locaux en mode prod.
# Fait charger .env.e2e (secrets jetables prod-like) au lieu de .env (dev).
# Usage : docker compose --env-file .env.e2e -f docker/docker-compose.yml -f docker/docker-compose.e2e.yml up -d
services:
  app:
    env_file:
      - ../.env.e2e
    environment:
      # Stack e2e JETABLE : on garde NODE_ENV=production (test du vrai mode prod)
      # mais on relâche le rate-limit de login. E2E_STACK=true est le double opt-in
      # exigé par le garde-fou de boot (mongo/server/index.js) pour autoriser RELAX
      # en production sur une instance jetable. NE JAMAIS mettre en vraie prod.
      RELAX_RATE_LIMIT: "true"
      E2E_STACK: "true"
    # Publie l'app en HTTP direct (sans nginx ni redirection HTTPS) pour pouvoir
    # la forwarder via un tunnel (VS Code devtunnel, ngrok…) et tester en externe.
    ports:
      - "8090:3000"
