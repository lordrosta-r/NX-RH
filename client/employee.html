<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NanoXplore RH — Mon espace</title>

    <!-- Inter font — loaded before render to avoid FOUT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!--
      Anti-flash: apply locale from localStorage synchronously before React
      mounts, so the correct language is set on first paint.
      The inner app pages (dashboard, manager) do not use data-theme —
      they always render in Editorial Enterprise light mode.
    -->
    <!-- Anti-flash: apply theme + locale before React mounts -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('nx_theme')
          var valid = ['dark', 'light', 'light-sidebar']
          document.documentElement.setAttribute('data-theme', valid.indexOf(t) !== -1 ? t : 'dark')
          var l = localStorage.getItem('nx_locale')
          if (l) document.documentElement.setAttribute('lang', l === 'fr' ? 'fr' : 'en')
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
          document.documentElement.setAttribute('lang', 'fr')
        }
      })()
    </script>

    <!--
      MPA entry point for the Employee page.
      Express serves this at GET /employee (auth-protected).
      Vite compiles it into server/public/employee.html.
    -->
  </head>
  <body>
    <div id="root" tabindex="-1"></div>
    <script type="module" src="/src/pages/employee/main.jsx"></script>
  </body>
</html>
