# =============================================================================
# Nginx — Dev override: route /api to Express, / to Vite dev server (HMR)
# This file REPLACES nginx/conf.d/app.conf in docker-compose.dev.yml
# =============================================================================

upstream nanoxplore_app {
    server app:3000;
    keepalive 32;
}

upstream vite_dev {
    server frontend:5173;
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # API → Express
    location /api/ {
        proxy_pass http://nanoxplore_app;
        include    /etc/nginx/conf.d/proxy_params.conf;
    }

    # Vite HMR websocket
    location /@vite/ {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /@react-refresh {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # All other traffic → Vite dev server
    location / {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
