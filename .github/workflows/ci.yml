name: CI

on:
  push:
    branches: [main, refactor, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
    defaults:
      run:
        working-directory: mongo/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mongo/server/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/nxrh_test
          JWT_SECRET: test_secret_ci
          JWT_EXPIRES_IN: 1h

  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-v2/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test -- --run
        continue-on-error: true
