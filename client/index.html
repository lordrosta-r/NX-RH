<!DOCTYPE html>
<!-- Single SPA entry point — replaces the 12 per-page HTML files (MPA → SPA migration) -->
<html lang="fr">
  <head>
    <style>html, body { background: #fcf9f8; }</style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NanoXplore RH</title>

    <!-- Anti-flash: apply theme + locale before React mounts -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('nx_theme')
          var valid = ['dark', 'light', 'light-sidebar']
          document.documentElement.setAttribute('data-theme', valid.indexOf(t) !== -1 ? t : 'dark')
          if (t === 'dark') document.documentElement.style.background = '#111010'
          else document.documentElement.style.background = '#fcf9f8'
          var l = localStorage.getItem('nx_locale')
          if (l) document.documentElement.setAttribute('lang', l === 'fr' ? 'fr' : 'en')
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
          document.documentElement.setAttribute('lang', 'fr')
        }
      })()
    </script>

    <!-- Google Fonts — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root" tabindex="-1"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
