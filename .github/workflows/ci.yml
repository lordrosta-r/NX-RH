name: CI

# Intégration continue : tests backend + vérifications frontend.
# Un seul workflow, deux jobs parallèles. Les runs obsolètes d'une même branche
# sont annulés automatiquement (pas de doublons, pas de bruit).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s --health-timeout 5s --health-retries 5
    defaults:
      run:
        working-directory: mongo/server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mongo/server/package-lock.json
      - run: npm ci
      - name: Tests (Jest + coverage)
        run: npm test -- --coverage
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/nxrh_test
          MONGODB_URI: mongodb://localhost:27017/nxrh_test
          JWT_SECRET: test_jwt_secret_for_ci_only_0123456789
          JWT_REFRESH_SECRET: test_jwt_refresh_secret_for_ci_only_0123456789
          JWT_EXPIRES_IN: 1h

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-v2
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-v2/package-lock.json
      - run: npm ci
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Unit tests (Vitest)
        run: npm run test:run
      - name: Build
        run: npm run build
