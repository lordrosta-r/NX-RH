# =============================================================================
# Nginx — Main configuration
# =============================================================================

user  nginx;
worker_processes  auto;                 # One worker per CPU core
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time"';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;             # Don't expose nginx version

    # ── Compression ──────────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/x-javascript text/xml application/xml
        image/svg+xml font/truetype font/opentype;

    # ── Rate limiting (basic DDoS protection) ────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=1500r/m;
    # 30r/m + burst : tolère un utilisateur qui se trompe / une IP partagée.
    # L'anti-brute-force fin reste le limiter par email côté Express (5/email/15min).
    limit_req_zone $binary_remote_addr zone=login:10m rate=30r/m;

    # Load site-specific configs
    include /etc/nginx/conf.d/*.conf;
}
